<div class="pub-entry">
  <div class="pub-image">
    <img src="{{ include.image }}" alt="{{ include.title }}">
  </div>
  <div class="pub-info">
    <h3>
      <a href="{{ include.link }}">{{ include.title }}</a>
    </h3>
    <p>{{ include.authors }}</p>
    <ul>
      <li>{{ include.description }}</li>
    </ul>
  </div>
</div>
